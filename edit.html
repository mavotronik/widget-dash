<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Designer</title>
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>

<div class="topbar">
  <div>
    <a class="btn btn-with-icon" href="/">
      <span class="mdi mdi-arrow-left btn-icon" aria-hidden="true"></span>
      <span>Дашборд</span>
    </a>
  </div>
  <div id="screenTitle">Dashboard</div>
  <div class="topbar-actions">
    <button type="button" class="btn btn-with-icon btn-secondary" id="autoAdvanceToggle" aria-pressed="false" title="Автопереход экранов по таймеру">
      <span class="mdi mdi-motion-pause btn-icon" id="autoAdvanceIcon" aria-hidden="true"></span>
      <span id="autoAdvanceLabel">Автопереход выкл</span>
    </button>
    <button class="btn btn-with-icon" id="nextScreenBtn" hidden>
      <span class="mdi mdi-skip-next btn-icon" aria-hidden="true"></span>
      <span>Следующий экран</span>
    </button>
  </div>
</div>

<div class="main">
  <aside class="sidebar active" id="sidebar">
    <h3>Тема</h3>
    <label for="primaryColor">Основной цвет</label>
    <input type="color" id="primaryColor">
    <label for="backgroundColor">Фон</label>
    <input type="color" id="backgroundColor">
    <button class="btn btn-with-icon" id="applyThemeBtn">
      <span class="mdi mdi-check btn-icon" aria-hidden="true"></span>
      <span>Применить</span>
    </button>

    <hr class="divider">

    <h3>Экраны</h3>
    <div class="screen-list" id="screenList"></div>
    <button class="btn btn-with-icon" id="addScreenBtn">
      <span class="mdi mdi-plus btn-icon" aria-hidden="true"></span>
      <span>Экран</span>
    </button>

    <hr class="divider">

    <h3>Виджеты</h3>
    <button class="btn btn-with-icon" data-widget="clock">
      <span class="mdi mdi-clock-outline btn-icon" aria-hidden="true"></span>
      <span>Часы</span>
    </button>
    <button class="btn btn-with-icon" data-widget="date">
      <span class="mdi mdi-calendar btn-icon" aria-hidden="true"></span>
      <span>Дата</span>
    </button>
    <button class="btn btn-with-icon" data-widget="text">
      <span class="mdi mdi-format-text btn-icon" aria-hidden="true"></span>
      <span>Текст</span>
    </button>
    <button class="btn btn-with-icon" data-widget="image">
      <span class="mdi mdi-image btn-icon" aria-hidden="true"></span>
      <span>Картинка</span>
    </button>
  </aside>

  <div class="dashboard" id="dashboard"></div>
</div>

<div id="screenSettingsModal" class="modal-overlay" hidden>
  <div class="modal-dialog">
    <div class="modal-header">
      <h3 id="screenSettingsTitle">Настройки экрана</h3>
      <button type="button" class="modal-close" id="screenSettingsClose" aria-label="Закрыть">
        <span class="mdi mdi-close" aria-hidden="true"></span>
      </button>
    </div>
    <div class="modal-body">
      <label for="screenName">Название</label>
      <input type="text" id="screenName">

      <label for="screenAdvanceMode">Режим смены</label>
      <select id="screenAdvanceMode">
        <option value="timer">По таймеру</option>
        <option value="button">По кнопке</option>
      </select>

      <div id="screenTimerFields">
        <label for="screenDisplayDuration">Длительность показа (сек)</label>
        <input type="number" id="screenDisplayDuration" min="1" max="3600">
      </div>

      <label for="screenEnterEffect">Эффект появления</label>
      <select id="screenEnterEffect">
        <option value="none">Нет</option>
        <option value="fade">Затухание</option>
        <option value="slideDown">Сверху вниз</option>
        <option value="slideUp">Снизу вверх</option>
        <option value="overlay">Наложение</option>
      </select>

      <label for="screenAnimationDuration">Длительность анимации (мс)</label>
      <input type="number" id="screenAnimationDuration" min="0" max="3000" step="50">

      <button type="button" class="btn btn-danger btn-with-icon" id="screenDeleteBtn">
        <span class="mdi mdi-delete btn-icon" aria-hidden="true"></span>
        <span>Удалить экран</span>
      </button>
    </div>
  </div>
</div>

<div id="widgetSettingsModal" class="modal-overlay" hidden>
  <div class="modal-dialog">
    <div class="modal-header">
      <h3 id="widgetSettingsTitle">Настройки виджета</h3>
      <button type="button" class="modal-close" id="widgetSettingsClose" aria-label="Закрыть">
        <span class="mdi mdi-close" aria-hidden="true"></span>
      </button>
    </div>
    <div class="modal-body">
      <div id="textSettings">
        <label for="widgetFontSize">Размер текста (px)</label>
        <input type="number" id="widgetFontSize" min="8" max="200" placeholder="По умолчанию">

        <label for="widgetFontFamily">Шрифт</label>
        <select id="widgetFontFamily">
          <option value="">По умолчанию</option>
          <option value="Arial, sans-serif">Arial</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="'Times New Roman', serif">Times New Roman</option>
          <option value="'Courier New', monospace">Courier New</option>
          <option value="system-ui, sans-serif">System UI</option>
        </select>

        <label for="widgetColor">Цвет текста</label>
        <input type="color" id="widgetColor">

        <div id="textContentField">
          <label for="widgetText">Текст</label>
          <input type="text" id="widgetText">
        </div>
      </div>

      <div id="imageSettings" hidden>
        <label for="widgetUrl">Путь / URL</label>
        <input type="text" id="widgetUrl" placeholder="/images/photo.jpg">

        <label for="widgetFile">Выбрать файл</label>
        <input type="file" id="widgetFile" accept="image/*">
      </div>

      <button type="button" class="btn btn-danger btn-with-icon" id="widgetDeleteBtn">
        <span class="mdi mdi-delete btn-icon" aria-hidden="true"></span>
        <span>Удалить виджет</span>
      </button>
    </div>
  </div>
</div>

<script type="module" src="/src/edit.js"></script>
</body>
</html>
