<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Designer</title>
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>

<div class="topbar">
  <div>
    <a class="btn btn-with-icon" id="viewDashboardLink" href="/">
      <span class="mdi mdi-arrow-left btn-icon" aria-hidden="true"></span>
      <span>Дашборд</span>
    </a>
  </div>
  <div id="screenTitle">Dashboard</div>
  <div class="topbar-actions">
    <button type="button" class="btn btn-with-icon btn-secondary" id="globalSettingsBtn" title="Настройки">
      <span class="mdi mdi-cog btn-icon" aria-hidden="true"></span>
      <span>Настройки</span>
    </button>
    <button type="button" class="btn btn-with-icon btn-secondary" id="autoAdvanceToggle" aria-pressed="false" title="Автопереход экранов по таймеру">
      <span class="mdi mdi-motion-pause btn-icon" id="autoAdvanceIcon" aria-hidden="true"></span>
      <span id="autoAdvanceLabel">Автопереход выкл</span>
    </button>
    <button class="btn btn-with-icon" id="nextScreenBtn" hidden>
      <span class="mdi mdi-skip-next btn-icon" aria-hidden="true"></span>
      <span>Следующий экран</span>
    </button>
  </div>
</div>

<div class="main">
  <aside class="sidebar active" id="sidebar">
    <h3>Дашборды</h3>
    <div class="dashboard-list" id="dashboardList"></div>
    <button class="btn btn-with-icon" id="createDashboardBtn" type="button">
      <span class="mdi mdi-plus btn-icon" aria-hidden="true"></span>
      <span>Создать дашборд</span>
    </button>
    <button class="btn btn-with-icon btn-secondary" id="saveBlueprintBtn" type="button">
      <span class="mdi mdi-content-save btn-icon" aria-hidden="true"></span>
      <span>Сохранить как blueprint</span>
    </button>

    <hr class="divider">

    <h3>Экраны</h3>
    <div class="screen-list" id="screenList"></div>
    <button class="btn btn-with-icon" id="addScreenBtn" type="button">
      <span class="mdi mdi-plus btn-icon" aria-hidden="true"></span>
      <span>Экран</span>
    </button>

    <hr class="divider">

    <h3>Виджеты</h3>
    <button class="btn btn-with-icon" type="button" data-widget="clock">
      <span class="mdi mdi-clock-outline btn-icon" aria-hidden="true"></span>
      <span>Часы</span>
    </button>
    <button class="btn btn-with-icon" type="button" data-widget="date">
      <span class="mdi mdi-calendar btn-icon" aria-hidden="true"></span>
      <span>Дата</span>
    </button>
    <button class="btn btn-with-icon" type="button" data-widget="text">
      <span class="mdi mdi-format-text btn-icon" aria-hidden="true"></span>
      <span>Текст</span>
    </button>
    <button class="btn btn-with-icon" type="button" data-widget="image">
      <span class="mdi mdi-image btn-icon" aria-hidden="true"></span>
      <span>Картинка</span>
    </button>
    <button class="btn btn-with-icon" type="button" data-widget="numeric">
      <span class="mdi mdi-numeric btn-icon" aria-hidden="true"></span>
      <span>Число</span>
    </button>
    <button class="btn btn-with-icon" type="button" data-widget="button">
      <span class="mdi mdi-gesture-tap-button btn-icon" aria-hidden="true"></span>
      <span>Кнопка</span>
    </button>
    <button class="btn btn-with-icon" type="button" data-widget="switch">
      <span class="mdi mdi-toggle-switch btn-icon" aria-hidden="true"></span>
      <span>Переключатель</span>
    </button>
    <button class="btn btn-with-icon" type="button" data-widget="ping">
      <span class="mdi mdi-lan-check btn-icon" aria-hidden="true"></span>
      <span>Ping</span>
    </button>
  </aside>

  <div class="dashboard" id="dashboard"></div>
</div>

<div id="globalSettingsModal" class="modal-overlay" hidden>
  <div class="modal-dialog modal-dialog--wide">
    <div class="modal-header">
      <h3>Настройки</h3>
      <button type="button" class="modal-close" id="globalSettingsClose" aria-label="Закрыть">
        <span class="mdi mdi-close" aria-hidden="true"></span>
      </button>
    </div>
    <div class="modal-body">
      <section class="settings-section">
        <h4 class="settings-section-title">Тема</h4>
        <label for="primaryColor">Основной цвет</label>
        <input type="color" id="primaryColor">
        <label for="backgroundColor">Фон</label>
        <input type="color" id="backgroundColor">
      </section>

      <hr class="divider">

      <section class="settings-section">
        <h4 class="settings-section-title">Привязка</h4>
        <div class="toggle-btn-group">
          <label class="toggle-btn">
            <input type="checkbox" id="snapEdgeAlign" class="toggle-btn-input" checked>
            <span class="toggle-btn-face">
              <span class="mdi mdi-vector-square btn-icon" aria-hidden="true"></span>
              <span>Выравнивание границ</span>
              <span class="mdi mdi-check toggle-btn-check" aria-hidden="true"></span>
            </span>
          </label>
          <label class="toggle-btn">
            <input type="checkbox" id="snapSizeMatch" class="toggle-btn-input" checked>
            <span class="toggle-btn-face">
              <span class="mdi mdi-arrow-expand-all btn-icon" aria-hidden="true"></span>
              <span>Подгонка размера</span>
              <span class="mdi mdi-check toggle-btn-check" aria-hidden="true"></span>
            </span>
          </label>
        </div>
      </section>

      <hr class="divider">

      <section class="settings-section">
        <h4 class="settings-section-title">Home Assistant</h4>
        <label class="toggle-btn toggle-btn--block">
          <input type="checkbox" id="haEnabled" class="toggle-btn-input">
          <span class="toggle-btn-face">
            <span class="mdi mdi-home-assistant btn-icon" aria-hidden="true"></span>
            <span>Включить</span>
            <span class="mdi mdi-check toggle-btn-check" aria-hidden="true"></span>
          </span>
        </label>
        <label for="haUrl">URL</label>
        <input type="url" id="haUrl" placeholder="http://homeassistant.local:8123">
        <label for="haToken">Long-Lived Access Token</label>
        <input type="password" id="haToken" placeholder="Long-Lived Access Token" autocomplete="off">
        <button type="button" class="btn btn-secondary btn-with-icon" id="haTestBtn">
          <span class="mdi mdi-connection btn-icon" aria-hidden="true"></span>
          <span>Проверить подключение</span>
        </button>
        <p class="connection-status" id="haStatus"></p>
      </section>

      <hr class="divider">

      <section class="settings-section">
        <h4 class="settings-section-title">MQTT</h4>
        <label class="toggle-btn toggle-btn--block">
          <input type="checkbox" id="mqttEnabled" class="toggle-btn-input">
          <span class="toggle-btn-face">
            <span class="mdi mdi-antenna btn-icon" aria-hidden="true"></span>
            <span>Включить</span>
            <span class="mdi mdi-check toggle-btn-check" aria-hidden="true"></span>
          </span>
        </label>
        <label for="mqttHost">Хост</label>
        <input type="text" id="mqttHost" placeholder="localhost">
        <label for="mqttPort">Порт</label>
        <input type="number" id="mqttPort" min="1" max="65535" value="1883">
        <label class="toggle-btn toggle-btn--block">
          <input type="checkbox" id="mqttUseAuth" class="toggle-btn-input">
          <span class="toggle-btn-face">
            <span class="mdi mdi-lock-outline btn-icon" aria-hidden="true"></span>
            <span>Авторизация</span>
            <span class="mdi mdi-check toggle-btn-check" aria-hidden="true"></span>
          </span>
        </label>
        <div id="mqttAuthFields" hidden>
          <label for="mqttUsername">Имя пользователя</label>
          <input type="text" id="mqttUsername" autocomplete="off">
          <label for="mqttPassword">Пароль</label>
          <input type="password" id="mqttPassword" autocomplete="new-password">
        </div>
        <button type="button" class="btn btn-secondary btn-with-icon" id="mqttTestBtn">
          <span class="mdi mdi-connection btn-icon" aria-hidden="true"></span>
          <span>Проверить подключение</span>
        </button>
        <p class="connection-status" id="mqttStatus"></p>
      </section>

      <p class="autosave-hint">Изменения сохраняются автоматически</p>
    </div>
  </div>
</div>

<div id="dashboardSettingsModal" class="modal-overlay" hidden>
  <div class="modal-dialog">
    <div class="modal-header">
      <h3 id="dashboardSettingsTitle">Настройки дашборда</h3>
      <button type="button" class="modal-close" id="dashboardSettingsClose" aria-label="Закрыть">
        <span class="mdi mdi-close" aria-hidden="true"></span>
      </button>
    </div>
    <div class="modal-body">
      <label for="dashboardSettingsName">Название</label>
      <input type="text" id="dashboardSettingsName">

      <label for="dashboardSettingsSlug">Slug (URL)</label>
      <input type="text" id="dashboardSettingsSlug" placeholder="main">

      <label for="dashboardSettingsResolutionPreset">Разрешение холста</label>
      <select id="dashboardSettingsResolutionPreset"></select>

      <label for="dashboardSettingsDesignWidth">Ширина (px)</label>
      <input type="number" id="dashboardSettingsDesignWidth" min="320" max="7680">

      <label for="dashboardSettingsDesignHeight">Высота (px)</label>
      <input type="number" id="dashboardSettingsDesignHeight" min="240" max="4320">

      <label for="dashboardSettingsPingIntervalMs">Интервал между виджетами ping (мс)</label>
      <input type="number" id="dashboardSettingsPingIntervalMs" min="500" max="60000" step="100">

      <p class="autosave-hint">Изменения сохраняются автоматически</p>

      <button type="button" class="btn btn-danger btn-with-icon" id="dashboardSettingsDeleteBtn">
        <span class="mdi mdi-delete btn-icon" aria-hidden="true"></span>
        <span>Удалить дашборд</span>
      </button>
    </div>
  </div>
</div>

<div id="createDashboardModal" class="modal-overlay" hidden>
  <div class="modal-dialog">
    <div class="modal-header">
      <h3>Новый дашборд</h3>
      <button type="button" class="modal-close" id="createDashboardClose" aria-label="Закрыть">
        <span class="mdi mdi-close" aria-hidden="true"></span>
      </button>
    </div>
    <div class="modal-body">
      <label for="newDashboardName">Название</label>
      <input type="text" id="newDashboardName" placeholder="Мой дашборд">

      <label for="newDashboardSlug">Slug (URL)</label>
      <input type="text" id="newDashboardSlug" placeholder="my-dashboard">

      <label for="newDashboardBlueprint">Blueprint (необязательно)</label>
      <select id="newDashboardBlueprint">
        <option value="">Без шаблона</option>
      </select>

      <label for="newResolutionPreset">Разрешение</label>
      <select id="newResolutionPreset"></select>

      <label for="newDesignWidth">Ширина (px)</label>
      <input type="number" id="newDesignWidth" min="320" max="7680">

      <label for="newDesignHeight">Высота (px)</label>
      <input type="number" id="newDesignHeight" min="240" max="4320">

      <button type="button" class="btn btn-with-icon" id="createDashboardConfirmBtn">
        <span class="mdi mdi-check btn-icon" aria-hidden="true"></span>
        <span>Создать</span>
      </button>
    </div>
  </div>
</div>

<div id="saveBlueprintModal" class="modal-overlay" hidden>
  <div class="modal-dialog">
    <div class="modal-header">
      <h3>Сохранить blueprint</h3>
      <button type="button" class="modal-close" id="saveBlueprintClose" aria-label="Закрыть">
        <span class="mdi mdi-close" aria-hidden="true"></span>
      </button>
    </div>
    <div class="modal-body">
      <label for="blueprintName">Название</label>
      <input type="text" id="blueprintName" placeholder="Шаблон lobby">

      <label for="blueprintDescription">Описание</label>
      <input type="text" id="blueprintDescription" placeholder="Необязательно">

      <button type="button" class="btn btn-with-icon" id="saveBlueprintConfirmBtn">
        <span class="mdi mdi-content-save btn-icon" aria-hidden="true"></span>
        <span>Сохранить</span>
      </button>
    </div>
  </div>
</div>

<div id="screenSettingsModal" class="modal-overlay" hidden>
  <div class="modal-dialog">
    <div class="modal-header">
      <h3 id="screenSettingsTitle">Настройки экрана</h3>
      <button type="button" class="modal-close" id="screenSettingsClose" aria-label="Закрыть">
        <span class="mdi mdi-close" aria-hidden="true"></span>
      </button>
    </div>
    <div class="modal-body">
      <label for="screenName">Название</label>
      <input type="text" id="screenName">

      <label for="screenAdvanceMode">Режим смены</label>
      <select id="screenAdvanceMode">
        <option value="timer">По таймеру</option>
        <option value="button">По кнопке</option>
      </select>

      <div id="screenTimerFields">
        <label for="screenDisplayDuration">Длительность показа (сек)</label>
        <input type="number" id="screenDisplayDuration" min="1" max="3600">
      </div>

      <label for="screenEnterEffect">Эффект появления</label>
      <select id="screenEnterEffect">
        <option value="none">Нет</option>
        <option value="fade">Затухание</option>
        <option value="slideDown">Сверху вниз</option>
        <option value="slideUp">Снизу вверх</option>
        <option value="overlay">Наложение</option>
      </select>

      <label for="screenAnimationDuration">Длительность анимации (мс)</label>
      <input type="number" id="screenAnimationDuration" min="0" max="3000" step="50">

      <button type="button" class="btn btn-danger btn-with-icon" id="screenDeleteBtn">
        <span class="mdi mdi-delete btn-icon" aria-hidden="true"></span>
        <span>Удалить экран</span>
      </button>
    </div>
  </div>
</div>

<div id="widgetSettingsModal" class="modal-overlay" hidden>
  <div class="modal-dialog">
    <div class="modal-header">
      <h3 id="widgetSettingsTitle">Настройки виджета</h3>
      <button type="button" class="modal-close" id="widgetSettingsClose" aria-label="Закрыть">
        <span class="mdi mdi-close" aria-hidden="true"></span>
      </button>
    </div>
    <div class="modal-body">
      <div id="textSettings">
        <label for="widgetFontSize">Размер текста (px)</label>
        <input type="number" id="widgetFontSize" min="8" max="200" placeholder="По умолчанию">

        <label for="widgetFontFamily">Шрифт</label>
        <select id="widgetFontFamily">
          <option value="">По умолчанию</option>
          <option value="Arial, sans-serif">Arial</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="'Times New Roman', serif">Times New Roman</option>
          <option value="'Courier New', monospace">Courier New</option>
          <option value="system-ui, sans-serif">System UI</option>
        </select>

        <label for="widgetColor">Цвет текста</label>
        <input type="color" id="widgetColor">

        <div id="textContentField">
          <label for="widgetText">Текст</label>
          <input type="text" id="widgetText">
        </div>

        <div id="textExternalFields" hidden>
          <label for="widgetContentMode">Режим</label>
          <select id="widgetContentMode">
            <option value="local">Локальный текст</option>
            <option value="external">Внешние данные</option>
          </select>

          <div id="textExternalSourceFields" hidden>
            <label for="widgetTextDataSource">Источник</label>
            <select id="widgetTextDataSource">
              <option value="ha">Home Assistant</option>
              <option value="mqtt">MQTT</option>
            </select>

            <div id="widgetTextHaField" hidden>
              <label>Сущность Home Assistant</label>
              <div id="widgetTextHaPicker"></div>
            </div>

            <div id="widgetTextMqttField" hidden>
              <label for="widgetTextMqttTopic">Топик подписки</label>
              <input type="text" id="widgetTextMqttTopic" placeholder="home/sensor/temp">
            </div>
          </div>
        </div>
      </div>

      <div id="imageSettings" hidden>
        <label for="widgetUrl">Путь / URL</label>
        <input type="text" id="widgetUrl" placeholder="/images/photo.jpg">

        <label for="widgetFile">Выбрать файл</label>
        <input type="file" id="widgetFile" accept="image/*">
      </div>

      <div id="numericSettings" hidden>
        <label for="widgetNumericDataSource">Источник</label>
        <select id="widgetNumericDataSource">
          <option value="ha">Home Assistant</option>
          <option value="mqtt">MQTT</option>
        </select>

        <div id="widgetNumericHaField">
          <label>Сущность Home Assistant</label>
          <div id="widgetNumericHaPicker"></div>
        </div>

        <div id="widgetNumericMqttField" hidden>
          <label for="widgetNumericMqttTopic">Топик подписки</label>
          <input type="text" id="widgetNumericMqttTopic" placeholder="home/sensor/temp">
        </div>

        <label for="widgetNumericValue">Значение (только просмотр)</label>
        <input type="number" id="widgetNumericValue" step="any" disabled>

        <label for="widgetNumericMin">Минимум</label>
        <input type="number" id="widgetNumericMin" step="any">

        <label for="widgetNumericMax">Максимум</label>
        <input type="number" id="widgetNumericMax" step="any">

        <label for="widgetNumericStep">Шаг</label>
        <input type="number" id="widgetNumericStep" min="0.000001" step="any">
      </div>

      <div id="buttonSettings" hidden>
        <label for="widgetButtonLabel">Текст кнопки</label>
        <input type="text" id="widgetButtonLabel" placeholder="Кнопка">

        <label for="widgetButtonMqttTopic">Топик отправки (MQTT)</label>
        <input type="text" id="widgetButtonMqttTopic" placeholder="home/button/action">

        <label for="widgetButtonMqttQos">QoS</label>
        <select id="widgetButtonMqttQos">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
        </select>
      </div>

      <div id="switchSettings" hidden>
        <label for="widgetSwitchPositions">Позиции (по одной на строку)</label>
        <textarea id="widgetSwitchPositions" rows="4" placeholder="1&#10;2"></textarea>

        <label for="widgetSwitchSelected">Активная позиция</label>
        <input type="number" id="widgetSwitchSelected" min="1" step="1">

        <label for="widgetSwitchEmitMode">Возвращаемое событие</label>
        <select id="widgetSwitchEmitMode">
          <option value="name">Имя позиции</option>
          <option value="index">Номер позиции</option>
        </select>

        <label for="widgetSwitchMqttTopic">Топик отправки (MQTT)</label>
        <input type="text" id="widgetSwitchMqttTopic" placeholder="home/switch/state">

        <label for="widgetSwitchMqttQos">QoS</label>
        <select id="widgetSwitchMqttQos">
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
        </select>
      </div>

      <div id="pingSettings" hidden>
        <label for="widgetPingHost">Хост</label>
        <input type="text" id="widgetPingHost" placeholder="example.com">

        <label for="widgetPingAttempts">Количество попыток</label>
        <input type="number" id="widgetPingAttempts" min="1" max="10" step="1">

        <label for="widgetPingIntervalMs">Интервал ping (мс)</label>
        <input type="number" id="widgetPingIntervalMs" min="500" max="60000" step="100">
      </div>

      <button type="button" class="btn btn-danger btn-with-icon" id="widgetDeleteBtn">
        <span class="mdi mdi-delete btn-icon" aria-hidden="true"></span>
        <span>Удалить виджет</span>
      </button>
    </div>
  </div>
</div>

<script type="module" src="/src/edit.js"></script>
</body>
</html>
